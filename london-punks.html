<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>London Punks — Corelli.com</title>
  <meta name="description" content="London Punks — photography by Adam Corelli." />
  <meta property="og:title" content="London Punks — Corelli.com" />
  <meta property="og:description" content="Photography by Adam Corelli." />
  <meta property="og:type" content="website" />
  <style>
    :root{
      --brand:#205d92;
      --muted:#8ca7c4;
      --page-bg:#f8f9fa;
      --card:#fff;
      --text:#222;
      --max:1100px;

      --silver-bar:#eef1f4;
      --silver-border:#d6dde5;
      --nav-text:#111;

      font-family: 'Segoe UI','Helvetica Neue',Arial,'Liberation Sans',sans-serif;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--page-bg);
      color:var(--text);
      line-height:1.6;
      -webkit-font-smoothing:antialiased;
    }

    /* ===== Ribbon banner (matches index.html) ===== */
    header{
      background:transparent;
      text-align:center;
      padding:1.1rem 0 0.85rem 0;
    }

    .ribbon{
      display:block;
      margin:0 auto;
      background:var(--brand);
      color:#fff;
      padding:1.05rem 2.1rem;
      border-radius:8px;
      box-shadow:0 10px 22px rgba(32, 93, 146, 0.22);
      width:min(calc(100vw - 40px), 980px);
      position:relative;
      overflow:hidden;
    }

    .ribbon::before,
    .ribbon::after{
      content:"";
      position:absolute;
      top:0;
      width:64px;
      height:100%;
      background:var(--page-bg);
      pointer-events:none;
    }
    .ribbon::before{left:0;clip-path:polygon(0 0, 100% 50%, 0 100%);}
    .ribbon::after{right:0;clip-path:polygon(100% 0, 0 50%, 100% 100%);}

    header h1{
      margin:0;
      font-size:2.6rem;
      font-weight:700;
      letter-spacing:0.02em;
      line-height:1.05;
      color:#fff;
      position:relative;
      z-index:1;
      padding:0 0.6rem;
    }
    header h1 a{
      color:#fff;
      text-decoration:none;
    }
    header h1 a:hover,
    header h1 a:focus{
      text-decoration:underline;
      outline:none;
    }

    .header-divider-white{
      height:2px;
      background:#fff;
      margin-top:14px;
      box-shadow:0 1px 0 rgba(0,0,0,0.04);
    }

    /* ===== Nav on silver bar ===== */
    nav.banner-nav{
      display:flex;
      justify-content:center;
      gap:2.5rem;
      padding:0.45rem 0;
      background:var(--silver-bar);
      border-bottom:1px solid var(--silver-border);
      flex-wrap:wrap;
    }

    nav.banner-nav a{
      color:var(--nav-text);
      font-size:1.05rem;
      text-decoration:none;
      font-weight:600;
      letter-spacing:0.02em;
      transition:color .2s, background .2s;
      padding:0.22em 0.5em;
      border-radius:6px;
    }
    nav.banner-nav a:hover,
    nav.banner-nav a:focus{
      background:#fff;
      color:var(--brand);
      outline:none;
    }

    main{
      max-width:var(--max);
      margin: 22px auto 40px;
      padding: 0 20px;
      text-align:center;
    }

    .page-title{
      margin: 12px 0 14px 0;
      font-size: 2.0rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .photo-wrap{
      margin: 0 auto;
      width: min(740px, 66vw); /* about two-thirds on desktop */
      max-width: 100%;
    }

    .photo{
      display:block;
      width:100%;
      height:auto;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(44,62,80,0.12);
      background:#fff;
      border: 1px solid rgba(0,0,0,0.06);
    }

    /* Newspaper-ish cutline */
    .cutline-wrap{
      max-width: 820px;
      margin: 12px auto 12px auto;
      padding-top: 10px;
      border-top: 1px solid rgba(0,0,0,0.10);
      color: rgba(0,0,0,0.72);
      font-size: 0.98rem;
      line-height: 1.5;
    }
    .cutline{ margin:0; }

    /* Next nav (single link for first photo) */
    .pager{
      margin-top: 10px;
      display:flex;
      justify-content: center;
      max-width: 820px;
      margin-left: auto;
      margin-right: auto;
    }

    .pager a{
      display:inline-flex;
      align-items:center;
      gap:10px;
      text-decoration:none;
      font-weight:800;
      color: rgba(0,0,0,0.55);
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.10);
      background: rgba(255,255,255,0.75);
      min-width: 160px;
      justify-content: center;
    }
    .pager a:hover{
      color: var(--brand);
      border-color: rgba(32,93,146,0.25);
      background: #fff;
    }
    .pager a:focus-visible{
      outline: 3px solid rgba(32,93,146,0.22);
      outline-offset: 3px;
    }
    .pager .camera{
      font-size: 1.15rem;
      line-height: 1;
    }

    footer{
      max-width:var(--max);
      margin: 0 auto;
      padding: 0 20px 22px;
      text-align:center;
      color: var(--muted);
      font-size:0.95rem;
    }

    @media (max-width: 980px){
      header h1{ font-size:1.9rem; }
      .ribbon{ width:min(calc(100vw - 40px), 900px); padding:0.95rem 1.6rem; }
      .ribbon::before,.ribbon::after{ width:56px; }
      .photo-wrap{ width: min(720px, 86vw); }
    }
    @media (max-width: 520px){
      .ribbon{ width:calc(100vw - 24px); padding:0.85rem 1.25rem; }
      .ribbon::before,.ribbon::after{ width:44px; }
      .page-title{ font-size:1.55rem; }
      .photo-wrap{ width: 100%; }
      .pager a{ min-width: 0; width: 100%; }
    }
  </style>
</head>

<body>
  <header role="banner">
    <div class="ribbon" aria-label="Corelli.com site banner">
      <h1><a href="/index.html">Corelli.com</a></h1>
    </div>
    <div class="header-divider-white" aria-hidden="true"></div>
  </header>

  <nav class="banner-nav" aria-label="Site navigation">
    <a href="/about.html">About</a>
    <a href="/news-index.html">News Archive</a>
    <a href="/london-punks.html">Photography</a>
    <a href="/musings.html">Topical</a>
    <a href="/contact.html">Contact</a>
  </nav>

  <main role="main">
    <h2 class="page-title">London Punks</h2>

    <div class="photo-wrap">
      <img class="photo" src="images/london-punks.jpeg" alt="London punks photograph" />
    </div>

    <div class="cutline-wrap" aria-label="Photo caption">
      <p class="cutline">I quickly snapped this London fashions photo near Piccadilly in 1983 on a 35 mm film camera.</p>
    </div>

    <nav class="pager" aria-label="Photo navigation">
      <a href="spain-train.html" aria-label="Next photo: Spain Train Station">
        <span class="camera" aria-hidden="true">📷</span>
        <span>Next</span>
      </a>
    </nav>
  </main>

  <footer role="contentinfo">
    &copy; 2026 Adam Corelli. All rights reserved.
  </footer>
</body>
</html>
