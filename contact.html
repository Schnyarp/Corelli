<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Making Contact With Adam Corelli — Corelli.com</title>
  <meta name="description" content="Contact Adam Corelli — send a message." />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <style>
    :root{
      --brand:#205d92;
      --muted:#8ca7c4;
      --page-bg:#f8f9fa;
      --card:#fff;
      --text:#222;
      --max:780px;
      --radius:10px;

      --silver-bar: #eef1f4;
      --silver-border: #d6dde5;
      --nav-text: #111;

      font-family: 'Segoe UI','Helvetica Neue',Arial,'Liberation Sans',sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--page-bg);color:var(--text);-webkit-font-smoothing:antialiased;padding:0;line-height:1.6}

    /* ===== Ribbon banner (matches news-index.html) ===== */
    header{
      background:transparent;
      text-align:center;
      padding:1.1rem 0 0.85rem 0;
    }

    .ribbon{
      display:block;
      margin:0 auto;
      background:var(--brand);
      color:#fff;
      padding:1.05rem 2.1rem;
      border-radius:8px;
      box-shadow:0 10px 22px rgba(32, 93, 146, 0.22);
      width:min(calc(100vw - 40px), 980px);
      position:relative;
      overflow:hidden;
    }

    .ribbon::before,
    .ribbon::after{
      content:"";
      position:absolute;
      top:0;
      width:64px;
      height:100%;
      background:var(--page-bg); /* cutouts match page bg */
      pointer-events:none;
    }
    .ribbon::before{left:0;clip-path:polygon(0 0, 100% 50%, 0 100%);}
    .ribbon::after{right:0;clip-path:polygon(100% 0, 0 50%, 100% 100%);}

    header h1{
      margin:0;
      font-size:2.6rem;
      font-weight:700;
      letter-spacing:0.02em;
      line-height:1.05;
      color:#fff;
      position:relative;
      z-index:1;
      padding:0 0.6rem;
    }

    header h1 a{
      color:#fff;
      text-decoration:none;
    }
    header h1 a:hover,
    header h1 a:focus{
      text-decoration: underline;
      outline:none;
    }

    .header-divider-white{
      height:2px;
      background:#fff;
      margin-top:14px;
      box-shadow:0 1px 0 rgba(0,0,0,0.04);
    }

    /* ===== Nav on silver bar (matches news-index.html) ===== */
    nav.banner-nav{
      display:flex;
      justify-content:center;
      gap:2.5rem;
      padding:0.45rem 0;
      background:var(--silver-bar);
      border-bottom:1px solid var(--silver-border);
      flex-wrap:wrap;
    }

    nav.banner-nav a{
      color:var(--nav-text);
      font-size:1.05rem;
      text-decoration:none;
      font-weight:600;
      letter-spacing:0.02em;
      transition:color .2s, background .2s;
      padding:0.22em 0.5em;
      border-radius:6px;
    }

    nav.banner-nav a:hover,
    nav.banner-nav a:focus{
      background:#fff;
      color:var(--brand);
      outline:none;
    }

    /* Subhead styling */
    .subhead{
      max-width: var(--max);
      margin: 1.6rem auto 0.9rem auto;
      padding: 0 20px;
      text-align: center;
    }
    .subhead .kicker{
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    /* Hero image placed directly under the subhead */
    .contact-hero { text-align:center; padding:12px 12px 8px; }
    .contact-hero img {
      max-width:360px;
      width:78%;
      border-radius:10px;
      box-shadow:0 10px 30px rgba(44,62,80,0.12);
      display:block;
      margin:0 auto;
      background:#fff;
      border:1px solid #000;
    }

    main.wrap{ max-width:var(--max); margin: 0 auto 2rem; padding:0 20px; }
    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:0 6px 18px rgba(44,62,80,0.06);
      padding:1.8rem;
    }

    .lead { margin:0; color:var(--text); font-size:1rem; }

    footer.site-footer{
      text-align:center;
      color:var(--muted);
      font-size:0.95rem;
      padding:1.2rem 0 1rem 0;
    }
    .privacy-line{
      margin: 0 0 8px 0;
      color: #6f8eae;
      font-size: 0.92rem;
    }

    @media (max-width:900px){
      header{ padding:1.1rem 14px 0.85rem; }
      header h1{ font-size:1.9rem; }
      .ribbon{ width:min(calc(100vw - 40px), 900px); padding:0.95rem 1.6rem; }
      .ribbon::before,.ribbon::after{ width:56px; }
      nav.banner-nav { gap:1.2rem; padding:0.45rem 0; }
    }

    @media (max-width:700px){
      .contact-hero img { max-width:300px; width:86%; border-radius:8px; }
      .subhead .kicker{ font-size: 1.15rem; }
    }

    @media (max-width:520px){
      header h1{font-size:1.25rem}
      .ribbon{ width:calc(100vw - 24px); padding:0.85rem 1.25rem; }
      .ribbon::before,.ribbon::after{ width:44px; }
    }
  </style>
</head>
<body>
  <header role="banner">
    <div class="ribbon" aria-label="Corelli.com site banner">
      <h1><a href="/index.html">Corelli.com</a></h1>
    </div>
    <div class="header-divider-white" aria-hidden="true"></div>
  </header>

  <nav class="banner-nav" aria-label="Site navigation">
    <a href="/about.html">About</a>
    <a href="/news-index.html">News Archive</a>
    <a href="/gallery-lightbox.html">Photography</a>
    <a href="/musings.html">Topical</a>
    <a href="/contact.html" aria-current="page">Contact</a>
  </nav>

  <div class="subhead" aria-label="Page title">
    <div class="kicker">Making Contact With Adam Corelli</div>
  </div>

  <div class="contact-hero" aria-hidden="false">
    <img src="images/adam-on-telephone.jpeg" alt="Adam Corelli on the telephone" />
  </div>

  <main class="wrap" role="main">
    <div class="card" role="region" aria-labelledby="contact-heading">
      <p id="contact-heading" class="lead">The contact Adam Corelli section is being updated.</p>
    </div>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="privacy-line">Privacy: This site will not violate your privacy.</div>
    &copy; 2026 Adam Corelli. All rights reserved.
  </footer>
</body>
</html>
