<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Off The Wall — Corelli.com</title>
  <meta name="description" content="Off The Wall — a front page for imaginative, strange, and whimsical stories." />
  <meta property="og:title" content="Off The Wall — Corelli.com" />
  <meta property="og:description" content="Off The Wall — a front page for imaginative, strange, and whimsical stories." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/images/wall.jpeg" />
  <meta name="theme-color" content="#205d92" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">

  <style>
    :root{
      --brand:#205d92;
      --muted:#8ca7c4;
      --page-bg:#f8f9fa;
      --card:#fff;
      --text:#222;
      --max:1100px;
      --radius:10px;

      --silver-bar: #eef1f4;
      --silver-border: #d6dde5;
      --nav-text: #111;

      --soft-yellow:#fff8df;
      --soft-yellow-border:#f1e4b8;

      font-family: 'Segoe UI','Helvetica Neue',Arial,'Liberation Sans',sans-serif;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--page-bg);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      padding:0;
      line-height:1.6;
    }

    /* ===== Ribbon banner ===== */
    header{
      background: transparent;
      text-align: center;
      padding: 1.1rem 0 0.85rem 0;
    }

    .ribbon{
      display: block;
      margin: 0 auto;
      background: var(--brand);
      color: #fff;
      padding: 1.05rem 2.1rem;
      border-radius: 8px;
      box-shadow: 0 10px 22px rgba(32, 93, 146, 0.22);
      width: min(calc(100vw - 40px), 980px);
      position: relative;
      overflow: hidden;
    }

    .ribbon::before,
    .ribbon::after{
      content: "";
      position: absolute;
      top: 0;
      width: 64px;
      height: 100%;
      background: var(--page-bg);
      pointer-events: none;
    }
    .ribbon::before{
      left: 0;
      clip-path: polygon(0 0, 100% 50%, 0 100%);
    }
    .ribbon::after{
      right: 0;
      clip-path: polygon(100% 0, 0 50%, 100% 100%);
    }

    header h1{
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin: 0;
      padding: 0 0.6rem;
      line-height: 1.05;
      color: #fff;
      position: relative;
      z-index: 1;
    }

    header h1 a{
      color:#fff;
      text-decoration:none;
    }
    header h1 a:hover,
    header h1 a:focus{
      text-decoration: underline;
      outline: none;
    }

    .header-divider-white{
      height: 2px;
      background: #fff;
      margin-top: 14px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.04);
    }

    /* ===== Nav (silver bar) ===== */
    nav{
      display:flex;
      justify-content:center;
      gap:2.5rem;
      padding:0.45rem 0;
      background: var(--silver-bar);
      border-bottom: 1px solid var(--silver-border);
      flex-wrap: wrap;
    }

    nav a{
      color: var(--nav-text);
      font-size:1.05rem;
      text-decoration:none;
      font-weight:600;
      letter-spacing:0.02em;
      transition:color .2s, background .2s;
      padding:0.22em 0.5em;
      border-radius:6px;
    }

    nav a:hover{
      background:#fff;
      color: var(--brand);
    }

    /* ===== Yellow panel + black title bar ===== */
    .wall-panel{
      max-width: calc(var(--max) + 40px);
      margin: 14px auto 0;
      padding: 10px 20px 18px;
      background: var(--soft-yellow);
      border: 1px solid var(--soft-yellow-border);
      border-radius: 12px;
      box-shadow: 0 10px 22px rgba(44, 62, 80, 0.06);
    }

    .title-wrap{
      max-width: var(--max);
      margin: 0 auto 14px;
      padding: 0;
    }
    .section-title-bar{
      display:block;
      background:#000;
      color:#fff;
      padding:10px 14px;
      border-radius:0;
      width:100%;
      text-align:center;
    }
    .section-title-bar span{
      font-weight:800;
      letter-spacing:0.02em;
    }

    .hero{
      text-align:center;
      padding: 6px 12px 6px;
      max-width: var(--max);
      margin: 0 auto;
    }
    .hero .placeholder-hero{
      max-width: 820px;
      width: 78%;
      margin: 0 auto;
      border-radius: 12px;
      border: 2px solid #000;
      background: #fff;
      box-shadow: 0 10px 30px rgba(44,62,80,0.12);
      padding: 28px 16px;
      color: #333;
      font-weight: 700;
    }

    /* ===== Blurbs list (placeholder) ===== */
    main.wrap{
      max-width: var(--max);
      margin: 10px auto 0;
      padding: 0 12px;
    }

    .blurb-list{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 14px;
    }

    .blurb{
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 6px 18px rgba(44,62,80,0.06);
      padding: 14px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      min-height: 120px;
    }

    .placeholder{
      margin: 0;
      color:#333;
      font-size: 0.98rem;
      line-height: 1.45;
    }

    footer.site-footer{
      text-align:center;
      color:var(--muted);
      font-size:0.95rem;
      padding:1.2rem 0 1rem 0;
    }
    .privacy-line{
      margin: 0 0 8px 0;
      color: #6f8eae;
      font-size: 0.92rem;
    }

    @media (max-width:980px){
      header h1{ font-size:1.9rem; }
      .ribbon{
        width: min(calc(100vw - 40px), 900px);
        padding: 0.95rem 1.6rem;
      }
      .ribbon::before,
      .ribbon::after{ width:56px; }

      .wall-panel{ padding: 10px 14px 14px; }
      .hero .placeholder-hero{ width: 88%; }
      main.wrap{ padding: 0; }
    }

    @media (max-width:520px){
      .ribbon{
        width: calc(100vw - 24px);
        padding: 0.85rem 1.25rem;
      }
      .ribbon::before,
      .ribbon::after{ width:44px; }

      .wall-panel{ border-radius: 10px; }
      .hero .placeholder-hero{ width: 100%; border-radius: 10px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="ribbon" role="banner" aria-label="Corelli.com site banner">
      <h1><a href="index.html">Corelli.com</a></h1>
    </div>
    <div class="header-divider-white" aria-hidden="true"></div>
  </header>

  <nav aria-label="Site navigation">
    <a href="about.html">About</a>
    <a href="news-index.html">News Archive</a>
    <a href="london-punks.html">Photography</a>
    <a href="musings.html">Topical</a>
    <a href="contact.html">Contact</a>
  </nav>

  <section class="wall-panel" aria-label="Off The Wall front page panel">
    <div class="title-wrap" aria-label="Page title">
      <div class="section-title-bar" id="wall-title">
        <span>Off The Wall</span>
      </div>
    </div>

    <!-- If you have an image later, replace this placeholder block with an <img> like other pages -->
    <div class="hero" aria-hidden="false">
      <div class="placeholder-hero">Hero image goes here (optional).</div>
    </div>

    <main class="wrap" role="main" aria-label="Off The Wall stories list">
      <section class="blurb-list" aria-label="Off The Wall story blurbs">
        <article class="blurb" aria-label="Placeholder">
          <p class="placeholder">Story blurbs will go here.</p>
        </article>
      </section>
    </main>
  </section>

  <footer class="site-footer" role="contentinfo">
    <div class="privacy-line">Privacy: This site will not violate your privacy.</div>
    Contact: <a href="mailto:adam@corelli.com">adam@corelli.com</a><br>
    &copy; 2026 Adam Corelli. All rights reserved.
  </footer>
</body>
</html>
